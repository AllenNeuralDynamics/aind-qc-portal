[build-system]
requires = ["setuptools", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "aind-qc-portal"
description = "Generated from aind-library-template"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    {name = "Allen Institute for Neural Dynamics"}
]
classifiers = [
    "Programming Language :: Python :: 3"
]
readme = "README.md"
dynamic = ["version"]

dependencies = [
    'pydantic',
    'aind-data-schema>=2.4.0',
    'aind-data-access-api[docdb]',
    'panel>=1.8.4',
    'panel-material-ui',
    'altair',
    'boto3',
    's3fs',
    'aind-qcportal-schema>=0.6.3',
    'httpx',
    'altair',
    'h5py',
    'zombie-squirrel==0.9.2',
    'aind-metadata-utils>=0.1.2,<2',
]

[project.optional-dependencies]
dev = [
    'ruff',
    'coverage',
    'interrogate',
    'furo',
    'watchfiles'
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "aind_qc_portal.__version__"}

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "build",
    "dist",
    ".gitignore",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C90", # mccabe complexity
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.isort]
known-first-party = ["aind_qc_portal"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.coverage.run]
omit = ["*__init__*"]
source = ["aind_qc_portal", "tests"]

[tool.coverage.report]
exclude_lines = [
    "if __name__ == \"__main__\":",
    "from",
    "import",
    "pragma: no cover"
]
fail_under = 100

[tool.interrogate]
exclude = ["setup.py", "docs", "build"]
fail-under = 100
